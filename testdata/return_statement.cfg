#!KAMAILIO

# Regression: return statement must preserve space before the value.
# "return -1" must not become "return-1", "return 1" must not become "return1".

route[CHECK_SEC_AGREE] {
    if (!is_present_hf("Require") || !($hdr(Require) =~ ".*sec-agree.*")) {
        return -1;
    }
    if (!is_present_hf("Proxy-Require")
            || !($hdr(Proxy-Require) =~ ".*sec-agree.*")) {
        return -1;
    }
    if (!is_present_hf("Security-Client")) {
        return -1;
    }
    return 1;
}

route[BARE_RETURN] {
    if (something) {
        return;
    }
    return -1;
}
