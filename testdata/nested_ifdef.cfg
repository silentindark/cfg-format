#!KAMAILIO

# Regression: #!ifdef / #!else / #!endif inside a route block (or inside
# another #!ifdef body) must always start at column 0, never indented.

route[EMERGENCY_CALL] {
#!ifdef EMERGENCY_CSCF
    xerr("EMERGENCY CALL, emergency support is ENABLED\n");
    remove_hf("Route");
    $du = EMERGENCY_CSCF;
    #!ifdef NPLI_ENABLED
    $dlg_var(is_emergency_call) = "1";
#!endif
#!else
    xerr("EMERGENCY CALL, emergency support is disabled\n");
    send_reply("380", "Alternative Service");
    route(EXIT);
#!endif
}
