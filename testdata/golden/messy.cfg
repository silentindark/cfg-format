#!KAMAILIO
#!define WITH_AUTH
#!define WITH_MYSQL


debug=3
fork=yes
log_stderror=yes
log_facility=LOG_LOCAL0


loadmodule "db_mysql.so"
loadmodule "auth.so"
loadmodule "sl.so"

modparam("auth", "calculate_ha1", "1")
modparam("auth", "calculate_nonce", "1")


request_route {
    if (!www_authorize("myrealm", "subscriber")) {
        www_challenge("myrealm", "0");
        exit;
    }
    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }
    xlog("L_INFO", "Request from $fu\n");
    $var(x) = 1;
    $avp(k) = -1;
    if ($var(x) == 1) {
        xlog("L_INFO", "x is 1\n");
    } else {
        xlog("L_INFO", "x is not 1\n");
    }
    if ($var(mo_result) != 200
            && $avp(MO_SH_USER_ID) != $null
            && $var(retry_count) == 0
            && $avp(flags) != "") {
        xerr("condition failed for $avp(MO_SH_USER_ID)\n");
        exit;
    }
    t_relay();
}


failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }
    xlog("L_INFO", "Failure route\n");
}


route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}
