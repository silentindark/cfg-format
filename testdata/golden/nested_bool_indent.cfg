#!KAMAILIO


# Regression: || inside an && continuation must indent one level deeper than
# the && lines, not revert to p.depth-based indentation.
route[CHECK] {
    if (isflagset(FLT_183)
            && status == 200
            && (has_body("application/sdp")
                || get_body_part("application/sdp", "$var(foo)"))) {
        xdbg("200: Change a=inactive to a=sendrecv\n");
        replace_body("a=inactive", "a=sendrecv");
        msg_apply_changes();
    }
}

