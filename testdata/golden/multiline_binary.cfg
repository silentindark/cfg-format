#!KAMAILIO


# Regression: multi-line source binary expressions with operators at end of line
# (e.g. A - B + \n C - D) must be wrapped preserving source line groupings,
# not collapsed to a single long line.
route[TIMING] {
    $var(runtime) = $var(exit_ts_s) * 1000000 - $var(entry_ts_s) * 1000000
        + $var(exit_ts_u) - $var(entry_ts_u);
}
