#!KAMAILIO


# Regression: when the htable LHS contains a nested pvar like $(T_req($conid)),
# the grammar produces an ERROR node. The formatter must re-join the LHS and RHS
# on the same line and wrap greedily if needed.
route[TCPTLS] {
    if (condition1) {
        if (condition2) {
            if (condition3) {
                $sht(tcptls=>$(T_req($conid))) = $(T_req($ct){nameaddr.uri})
                    + ";alias=[" + $T_req($si) + "]~" + $T_req($sp) + "~2";
                $sht(tcptls_src=>$(T_req($conid))) = "sip:[" + $T_req($si)
                    + "]:" + $T_req($sp);
            }
        }
    }
}

